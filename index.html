<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Figwork Hiring Signal Demo</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <!-- LEFT: role setup / filters (compact; full brief lives in a drawer) -->
      <aside class="sidebar" aria-label="Role setup">
        <div class="brand-block">
          <div class="mark" aria-hidden="true">F</div>
          <div>
            <h1>Hiring Signal Demo</h1>
            <p>Candidate-role fit review</p>
          </div>
        </div>

        <section class="role-panel" aria-labelledby="role-title">
          <p class="eyebrow">Role</p>
          <h2 id="role-title">Full-Stack Software Engineer</h2>
          <p class="muted" id="role-sub">Sunnyvale · in person</p>

          <p class="req-label">Signal requirements</p>
          <div class="signal-list" id="roleSignals"></div>

          <div class="role-actions">
            <button id="editRoleButton" type="button" class="ghost-btn">Edit role brief</button>
            <button id="resetButton" type="button" class="ghost-btn">Reset demo</button>
          </div>
        </section>

        <button id="addCandidateButton" class="add-btn" type="button">+ Add candidate</button>
      </aside>

      <!-- RIGHT: workspace -->
      <section class="workspace" aria-label="Hiring workflow">
        <header class="topbar">
          <div>
            <p class="eyebrow">Recruiter workbench</p>
            <h2>Review candidate-role fit</h2>
            <p class="muted">Compare candidates using evidence-backed hiring signals.</p>
          </div>
          <select id="sortMode" aria-label="Sort candidates" class="sort-select">
            <option value="fit">Sort by fit</option>
            <option value="confidence">Sort by confidence</option>
            <option value="conversation">Sort by conversation readiness</option>
          </select>
        </header>

        <div class="content-grid">
          <!-- SHORTLIST: compact navigation -->
          <section class="candidate-column" aria-labelledby="shortlist-title">
            <div class="section-heading">
              <h3 id="shortlist-title">Shortlist</h3>
              <span class="count-pill" id="candidateCount">0</span>
            </div>
            <div id="candidateList" class="candidate-list"></div>
          </section>

          <!-- DECISION VIEW: dominant column -->
          <section class="detail-column" aria-live="polite">
            <div id="detailContent"></div>
          </section>
        </div>
      </section>
    </main>

    <!-- Candidate add/edit modal -->
    <div class="modal-backdrop" id="editorBackdrop" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
        <div class="modal-head">
          <h3 id="editorTitle">Add candidate</h3>
          <button id="editorClose" class="icon-btn" type="button" aria-label="Close">×</button>
        </div>
        <form id="editorForm" class="editor-form">
          <div class="field-grid">
            <label>Name<input id="f_name" type="text" required placeholder="Jordan Lee"></label>
            <label>Headline<input id="f_headline" type="text" placeholder="Full-stack engineer"></label>
          </div>
          <label>Availability
            <select id="f_location">
              <option value="relocating">Open to relocate / onsite</option>
              <option value="bay-area">Bay Area (hybrid)</option>
              <option value="remote-only">Remote only</option>
            </select>
          </label>
          <label data-field="text">Resume / profile text<textarea id="f_text" rows="5" placeholder="Paste resume or LinkedIn text..."></textarea></label>
          <label data-field="audio">Screening call notes (optional)<textarea id="f_audio" rows="3" placeholder="Screening call notes..."></textarea></label>
          <label data-field="video">Interview notes (optional)<textarea id="f_video" rows="3" placeholder="Interview impressions..."></textarea></label>
          <label>Tags (comma separated)<input id="f_tags" type="text" placeholder="React, Node, LLM eval"></label>
          <div class="modal-actions">
            <button type="submit" class="primary">Save candidate</button>
            <button type="button" class="secondary" id="editorCancel">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Role brief drawer (full brief, collapsed by default) -->
    <div class="modal-backdrop" id="roleBackdrop" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="roleEditorTitle">
        <div class="modal-head">
          <h3 id="roleEditorTitle">Role brief</h3>
          <button id="roleClose" class="icon-btn" type="button" aria-label="Close">×</button>
        </div>
        <div class="editor-form">
          <label>Full role brief<textarea id="roleInput" rows="10"></textarea></label>
          <div class="modal-actions">
            <button type="button" class="primary" id="roleDone">Done</button>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
